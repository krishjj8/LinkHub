apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: linkhub-ingress
spec:
  ingressClassName: traefik
  rules:
    - host: linkhub.13.235.27.139.nip.io
    - http:
        paths:
          # API TRAFFIC (T
          # (Port 8080)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: link-service
                port:
                  number: 80

          # WEBSITE TRAFFIC
          # (Port 80)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: linkhub-frontend
                port:
                  number: 80